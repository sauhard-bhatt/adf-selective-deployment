# Drop-in workflow (no .env/*json usage)
# Builds ARM from a selective subset and deploys to DEV only.
# Uses DeltaDentalCA/dd-action-azure-login@v1 (your original login pattern).

name: ADF Release - Build ARM + Selective Deploy to DEV

on:
  push:
    branches:
      - selective_deployment
  workflow_dispatch:
    inputs:
      manifest:
        description: "Manifest path for selective deployment"
        required: true
        default: "deploy/manifests/release.json"

permissions:
  id-token: write
  contents: read

env:
  SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  RESOURCE_GROUP: covid-reporting-rg
  DEV_FACTORY_NAME: covid-reporting-sauhard-adf
  ARM_OUTPUT_DIR: ArmTemplate

jobs:
  adf-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ADF Utilities package
        run: npm install
        working-directory: build

######## steps for introducing slective deployments ###########
      - name: Stage selective subset
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST="${{ github.event.inputs.manifest }}"
          if [ -z "${MANIFEST:-}" ] || [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            MANIFEST="deploy/manifests/release.json"
          fi
          echo "Using manifest: $MANIFEST"
          python3 scripts/select_adf_subset.py "$MANIFEST"
          echo "Subset report:"
          cat build/adf_subset_report.json
          echo "Staged tree:"
          find build/adf_subset -maxdepth 2 -type d

      - name: Debug subset structure
        shell: bash
        run: |
          set -euo pipefail
          echo "PWD=$(pwd)"
          echo "Listing build/:"
          ls -la build || true
          echo "Listing build/adf_subset/:"
          ls -la build/adf_subset
          echo "Tree (depth 2):"
          find build/adf_subset -maxdepth 2 -type d

      - name: Export ARM templates (CI publish) - SELECTIVE
        shell: bash
        run: |
          set -euo pipefail
          FACTORY_ID="/subscriptions/${{ env.SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ env.DEV_FACTORY_NAME }}"
          npm --prefix build run build -- export "adf_subset" "$FACTORY_ID" "${{ env.ARM_OUTPUT_DIR }}"
          echo "RESOURCE TYPES:"
          jq -r '.resources[].type' "build/${{ env.ARM_OUTPUT_DIR }}/ARMTemplateForFactory.json" | sort | uniq -c
          echo "parameters keys"
          jq -r '.parameters | keys[]' "build/${{ env.ARM_OUTPUT_DIR }}/ARMTemplateParametersForFactory.json" | sort

      - name: Strip infra-owned resources (produce safe template)
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/strip_arm_resources.py \
            --in "build/${{ env.ARM_OUTPUT_DIR }}/ARMTemplateForFactory.json" \
            --out "build/${{ env.ARM_OUTPUT_DIR }}/ARMTemplateForFactory.safe.json" \
            --strip-type Microsoft.DataFactory/factories/linkedServices \
            --strip-type Microsoft.DataFactory/factories/managedVirtualNetworks \
            --strip-type Microsoft.DataFactory/factories/managedVirtualNetworks/managedPrivateEndpoints \
            --strip-type Microsoft.DataFactory/factories/globalparameters \
            --strip-type Microsoft.DataFactory/factories/credentials \
            --strip-type Microsoft.DataFactory/factories/integrationRuntimes

          echo "SAFE RESOURCE TYPES:"
          if jq -r '.resources[].type' "build/${{ env.ARM_OUTPUT_DIR }}/ARMTemplateForFactory.safe.json" \
            | tr '[:upper:]' '[:lower:]' \
            | grep -Evq 'microsoft\.datafactory/factories/(pipelines|datasets)$'; then
            echo "ERROR: safe template contains unexpected types"
            jq -r '.resources[].type' "build/${{ env.ARM_OUTPUT_DIR }}/ARMTemplateForFactory.safe.json" | sort | uniq -c
            exit 1
          fi

          echo "ORIGINAL COUNT: $(jq '.resources|length' "build/${{ env.ARM_OUTPUT_DIR }}/ARMTemplateForFactory.json")"
          echo "SAFE COUNT    : $(jq '.resources|length' "build/${{ env.ARM_OUTPUT_DIR }}/ARMTemplateForFactory.safe.json")"

      - name: Write release metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p buildmeta
          cat > buildmeta/release.json <<EOF
          {
            "branch": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}"
          }
          EOF

      - name: Upload ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: adf-arm
          path: build/${{ env.ARM_OUTPUT_DIR }}

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: adf-release-meta
          path: buildmeta/release.json

      - name: Upload subset report
        uses: actions/upload-artifact@v4
        with:
          name: adf-subset-report
          path: build/adf_subset_report.json

  deploy_dev:
    environment: dev
    needs: adf-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: adf-arm
          path: artifacts

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure ADF CLI extension
        run: az extension show --name datafactory >/dev/null 2>&1 || az extension add --name datafactory --yes

      - name: Verify downloaded ARM files exist
        shell: bash
        run: |
          set -euo pipefail
          ls -la artifacts
          test -f artifacts/ARMTemplateForFactory.safe.json
          test -f artifacts/ARMTemplateParametersForFactory.json
          jq -e . artifacts/ARMTemplateForFactory.safe.json >/dev/null
          jq -e . artifacts/ARMTemplateParametersForFactory.json >/dev/null

      - name: Echo before deploy
        shell: bash
        run: |
          echo "Deploying to factoryName=${{ env.DEV_FACTORY_NAME }} in RG=${{ env.RESOURCE_GROUP }}"

      - name: Deploy ARM to DEV (Live)
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          subscriptionId: ${{ env.SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: artifacts/ARMTemplateForFactory.safe.json
          parameters: >
            artifacts/ARMTemplateParametersForFactory.json
            factoryName=${{ env.DEV_FACTORY_NAME }}
          deploymentName: adf-dev-${{ github.run_number }}
          deploymentMode: Incremental
